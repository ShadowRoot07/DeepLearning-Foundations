name: PyTorch Session 1
on: [push]

jobs:
  torch-basics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install PyTorch
        run: |
          pip install torch numpy
      - name: Run Tensor Lab
        run: python clase8_tensores.py

